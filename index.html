<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Laser Eyes | Perfil Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --btc-orange: #f2a900;
            --btc-orange-glow: rgba(242, 169, 0, 0.6);
            --bg-dark: #050507;
            --card-bg: rgba(20, 20, 25, 0.8);
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --border-color: rgba(63, 63, 70, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(40,40,50,0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(40,40,50,0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
            z-index: -2;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { 
            font-size: 3.5rem; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 40%, var(--btc-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--btc-orange-glow));
            margin-bottom: 10px;
        }
        .tagline { color: var(--text-dim); font-size: 1.15rem; }

        .card { 
            width: 100%; max-width: 620px; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
            position: relative;
        }

        .upload-zone {
            border: 2px dashed #3f3f46;
            padding: 60px 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
        }
        .upload-zone:hover { border-color: var(--btc-orange); background: rgba(242, 169, 0, 0.04); }

        .canvas-container { 
            position: relative; margin: 25px 0; 
            border-radius: 20px; overflow: hidden; 
            background: #000; border: 1px solid var(--border-color);
        }
        canvas { width: 100%; display: block; cursor: crosshair; }

        .btn { 
            background: var(--btc-orange); color: #000; border: none; 
            padding: 18px 25px; border-radius: 16px; font-weight: 700; 
            width: 100%; cursor: pointer; font-size: 1.05rem; margin: 10px 0; 
            transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { box-shadow: 0 0 25px var(--btc-orange-glow); transform: translateY(-2px); }
        .btn-alt { background: transparent; color: var(--text-main); border: 1px solid #3f3f46; }

        /* QR CENTRADO */
        .donation-box {
            margin-top: 35px; padding: 25px; 
            background: rgba(0,0,0,0.3); border-radius: 24px; 
            border: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        #qr-wrap { 
            background: white; padding: 15px; border-radius: 18px; 
            margin: 20px 0; display: flex; justify-content: center; align-items: center;
        }

        #step-2, #step-3 { display: none; animation: scaleIn 0.5s ease; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>₿ LASER EYES</h1>
        <p class="tagline">Personaliza tu perfil para la ciudadela</p>
    </header>

    <div class="card">
        <div id="step-1">
            <div class="upload-zone" onclick="document.getElementById('up').click()">
                <div style="font-size: 3.5rem; margin-bottom: 20px;">🖼️</div>
                <h3 style="margin-bottom: 8px;">Sube tu Foto</h3>
                <p style="color: var(--text-dim);">Haz clic o arrastra tu imagen</p>
                <input type="file" id="up" accept="image/*" style="display:none">
            </div>
        </div>

        <div id="step-2">
            <div class="canvas-container"><canvas id="cvs"></canvas></div>
            <p style="color: var(--btc-orange); text-align: center; margin-bottom: 20px; font-weight: 600;">⚡ Toca los ojos para activar los láseres</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn btn-alt" onclick="reset()">🔄 REPETIR</button>
                <button class="btn" onclick="irAFinalizar()">LISTO ✨</button>
            </div>
        </div>

        <div id="step-3">
            <button class="btn" style="background: #10b981; color: white;" onclick="descargar()">⬇️ DESCARGAR IMAGEN</button>
            
            <div class="donation-box">
                <p style="font-weight: 700;">Apoya al autor de la página</p>
                <p style="font-size: 0.85rem; color: var(--text-dim); margin-top: 5px;">
                    El 50% de las donaciones irán a proyectos <strong>Open Source</strong>.
                </p>
                <div id="qr-wrap"></div>
                <p style="font-family: monospace; color: var(--btc-orange); font-size: 0.85rem; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 8px;">
                    kakhan@coinos.io
                </p>
            </div>

            <button class="btn btn-alt" style="margin-top: 25px;" onclick="location.reload()">NUEVA FOTO</button>
        </div>
    </div>

<script>
    const LN_ADDR = 'kakhan@coinos.io';
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let imgBase = null, lasers = [];

    document.getElementById('up').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = ev => {
            imgBase = new Image();
            imgBase.onload = () => {
                const maxW = 1100;
                cvs.width = Math.min(imgBase.width, maxW);
                cvs.height = cvs.width / (imgBase.width / imgBase.height);
                dibujar();
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            };
            imgBase.src = ev.target.result;
        };
        r.readAsDataURL(file);
    };

    cvs.onclick = e => {
        const rect = cvs.getBoundingClientRect();
        lasers.push({
            x: (e.clientX - rect.left) * (cvs.width / rect.width),
            y: (e.clientY - rect.top) * (cvs.height / rect.height)
        });
        dibujar();
    };

    function dibujar() {
        ctx.drawImage(imgBase, 0, 0, cvs.width, cvs.height);
        lasers.forEach(l => {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            let size = cvs.width * 0.08;
            let g = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, size);
            g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#f2a900'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; 
            ctx.beginPath(); ctx.arc(l.x, l.y, size, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });
    }

    function reset() { lasers = []; dibujar(); }

    function irAFinalizar() {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'block';
        const qrContainer = document.getElementById('qr-wrap');
        qrContainer.innerHTML = '';
        new QRCode(qrContainer, { text: `lightning:${LN_ADDR}`, width: 180, height: 180 });
    }

    function descargar() {
        const a = document.createElement('a');
        a.download = 'laser-eyes.png';
        a.href = cvs.toDataURL('image/png', 1.0);
        a.click();
    }
</script>
</body>
</html>
